# Enable mouse support
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 50000

# Enable system clipboard integration
set -g set-clipboard on

# Use 'v' to begin selection, like in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use 'y' to yank (copy) the selection to the system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# Copy to clipboard on mouse release, but stay in copy mode
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xclip -selection clipboard"

# Use vi keys in copy mode
set-window-option -g mode-keys vi

# switch prefix to control-a, unmap b, allow double-a to go through
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Use 256-color mode with true color (if supported by your terminal)
set -as terminal-overrides ',xterm-256color:Tc'

# Use modern terminal capabilities
set -g default-terminal "tmux-256color"

set -sg escape-time 50

set -g bell-action none

# Source example file for keybindings
run-shell /usr/share/doc/tmux/example_tmux.conf

# --- Navigation (Vim Style) ---
# Use Ctrl+a then h/j/k/l to switch panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Resizing (Vim Style) ---
# Use Ctrl+a then Shift+h/j/k/l to resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Terminator Style Splits
# 'e' for Vertical (Side-by-Side)
bind e split-window -h -c "#{pane_current_path}"

# 'o' for Horizontal (Top-Bottom)
bind o split-window -v -c "#{pane_current_path}"

# Enable RGB (truecolor) support
set -as terminal-features ",xterm-256color:RGB"

bind r source-file ~/.tmux.conf \; display "Reloaded!"
