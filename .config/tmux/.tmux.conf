# Enable mouse support
set -g mouse on

# switch prefix to control-a, unmap b, allow double-a to go through
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Use 256-color mode with true color (if supported by your terminal)
set -as terminal-overrides ',xterm-256color:Tc'

# Use modern terminal capabilities
set -g default-terminal "tmux-256color"

set -sg escape-time 50

set -g bell-action none

# Source example file for keybindings
run-shell /usr/share/doc/tmux/example_tmux.conf

# --- Navigation (Vim Style) ---
# Use Ctrl+a then h/j/k/l to switch panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Resizing (Vim Style) ---
# Use Ctrl+a then Shift+h/j/k/l to resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Terminator Style Splits
# 'e' for Vertical (Side-by-Side)
bind e split-window -h -c "#{pane_current_path}"

# 'o' for Horizontal (Top-Bottom)
bind o split-window -v -c "#{pane_current_path}"
